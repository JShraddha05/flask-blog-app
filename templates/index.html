{% extends 'base.html' %}

{% block content %}
    {% for post in posts %}
        <h2>{{ post['title'] }}</h2>
        <p>{{ post['content'] }}</p>

        <a href="/edit/{{ post['id'] }}">Edit</a> |
        <a href="/delete/{{ post['id'] }}">Delete</a>
        <hr>
    {% endfor %}
{% endblock %}
